---
# Protocol-layer tests: schema validation (Pre-Gate-0) and LoST request structure checks.
# These tests fire before any gate logic runs.

- id: PROTO-REQ-BADNS-001
  description: >
    STP element submitted in the ca: namespace rather than the correct cae: namespace.
    lxml schema validation rejects it as an unexpected element before Gate 0 runs.
    Returns <badRequest> with an XSD validation message.
  preconditions:
    - No GIS data required; failure occurs at schema validation
  input_file: requests/PROTO-REQ-BADNS-001.xml
  expected:
    response_type: badRequest
  notes: >
    Without Pre-Gate-0 schema validation a misplaced namespace element would silently
    pass through or produce a misleading gate failure.
  spec_ref: "Pre-Gate-0"
  status: has_test

- id: PROTO-REQ-NOVALIDATE-001
  description: >
    findService request with validateLocation="false". The LVF only handles location
    validation requests. Any request where validateLocation is not literally "true"
    is rejected with <forbidden> before any gate runs.
  preconditions:
    - No GIS data required
  input_file: requests/PROTO-REQ-NOVALIDATE-001.xml
  expected:
    response_type: forbidden
  spec_ref: "STA-010.3.1 §4.1"
  status: has_test

- id: PROTO-REQ-BADXML-001
  description: >
    Intentionally malformed XML (missing closing tag). The XML parser rejects the
    document before schema validation or any gate runs. Returns <badRequest>.
  preconditions:
    - No GIS data required
  input_file: requests/PROTO-REQ-BADXML-001.xml
  expected:
    response_type: badRequest
  spec_ref: "Pre-Gate-0, RFC 5222 §12"
  status: has_test

- id: PROTO-REQ-NOSERVICE-001
  description: >
    Well-formed findService request with no <service> element. The LoST schema
    requires <service>. XSD validation fails and returns <badRequest>.
  preconditions:
    - No GIS data required
  input_file: requests/PROTO-REQ-NOSERVICE-001.xml
  expected:
    response_type: badRequest
  spec_ref: "Pre-Gate-0, RFC 5222 §8"
  status: has_test

- id: PROTO-REQ-ASOF-FUTURE-001
  description: >
    findService request with a <planned:asOf> datetime specifically in the future
    (as opposed to the past or current time). Verifies the asOf rejection is
    unconditional — the server must not attempt any evaluation regardless of the
    datetime value.
  preconditions:
    - No GIS data required
  input_file: requests/PROTO-REQ-ASOF-FUTURE-001.xml
  expected:
    response_type: badRequest
  notes: >
    Uses a future-dated asOf to confirm the rejection is unconditional — a future
    asOf is not a special case. The asOf value used is 2027-05-15T00:00:00Z (one
    year from 2026-05-15). The asOf rejection is a deliberate scope limitation,
    not a schema enforcement; the element is schema-valid but rejected before
    any gate logic runs.
  spec_ref: "Pre-Gate-0"
  status: has_test
