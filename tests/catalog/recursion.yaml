---
# Recursion tests: findService with recursive="true" and out-of-coverage scenarios.
# When recursive="true" and an admin-level failure falls outside civic coverage, the
# child LVF forwards the request to the parent LVF rather than returning <redirect>.
# The child prepends its own <via> to the response path and returns the parent's
# response verbatim.
#
# Tests marked LIVE require a running parent LVF (LVF_PARENT_URI=http://192.168.1.69:8001)
# provisioned with the relevant GIS data. Without the parent, these tests produce a
# serverTimeout or serverError outcome and the golden comparison will fail.
# Tests NOT marked LIVE are deterministic and pass without any parent connection.

- id: G2-RECURSE-FALSE-OOC-001
  description: >
    Out-of-coverage at ca:A2 (A2=Cass County, Fargo) with recursive="false". The LVF
    treats recursive="false" identically to the default (recursive absent): it returns
    <redirect> to the parent without making any outbound call. Confirms that the
    recursive="false" attribute is correctly parsed and does not alter the redirect path.
  preconditions:
    - LVF_PARENT_URI configured
    - No GIS records or civic coverage for A2=Cass County
  input_file: requests/G2-RECURSE-FALSE-OOC-001.xml
  expected:
    response_type: redirect
  notes: >
    Companion to G2-REDIRECT-OOC-A2-001 (same address without the recursive attribute).
    Both tests return identical <redirect> responses — the recursive attribute has no
    effect on out-of-coverage admin failures.
  spec_ref: "RFC 5222 §5, §6.1"
  status: has_test

- id: G2-RECURSE-LOOP-OOC-001
  description: >
    Out-of-coverage at ca:A2 (Cass County) with recursive="true" and a loop detected.
    The incoming request already carries this server's URI (child.lvf.ndaco.org) in its
    <path> element. The LVF detects its own URI before making any outbound call and
    returns <errors><loop> per RFC 5222 §13.1.
  preconditions:
    - LVF_SERVER_URI=child.lvf.ndaco.org
    - Request includes <path><via source="child.lvf.ndaco.org"/>
    - No GIS records or civic coverage for A2=Cass County
  input_file: requests/G2-RECURSE-LOOP-OOC-001.xml
  expected:
    response_type: loop
  notes: >
    Deterministic — no parent LVF required. Loop detection is purely local: the server
    checks whether its own URI appears in the incoming <path> element. No outbound HTTP
    call is attempted.
  spec_ref: "RFC 5222 §§5, 13.1"
  status: has_test

- id: G2-RECURSE-VALID-001
  description: >
    Out-of-coverage at ca:A2 (Cass County) with recursive="true". The child forwards
    the request to the parent which holds Cass County GIS data. The parent validates
    1522 8th Street North, Fargo (SSAP NGUID {D2E0AD84-A4B9-4282-A83A-ECA05AE12E6A})
    and returns a locationValidation with all submitted elements in <valid>. The child
    prepends its own <via> (child.lvf.ndaco.org) and returns the parent's response.
  preconditions:
    - LVF_PARENT_URI configured and parent LVF running
    - Parent provisioned with Cass County GIS data including the above SSAP record
  input_file: requests/G2-RECURSE-VALID-001.xml
  expected:
    response_type: locationValidation
    valid: [ca:country, ca:A1, ca:A2, ca:A3, ca:RD, ca:STS, ca:POD, ca:HNO]
  notes: >
    LIVE TEST — requires a running parent LVF. The golden captures the live parent
    response including mapping source (parent.lvf.ndaco.org), RED RIVER REGIONAL
    DISPATCH CENTER, and completeLocation with PCN=Fargo, PC=58102.
    Companion to G2-RECURSE-VALID-002 which adds PCN and PC to the submission.
  spec_ref: "RFC 5222 §5, §6 (Gate 2)"
  status: has_test

- id: G2-RECURSE-VALID-002
  description: >
    Same address as G2-RECURSE-VALID-001 (1522 8th Street North, Fargo, Cass County)
    with PCN=Fargo and PC=58102 submitted. The parent SSAP record carries Post_Comm=Fargo
    and Post_Code=58102. All submitted elements including postal fields are in <valid>.
    No completeLocation because all non-null GIS fields were submitted.
  preconditions:
    - Same as G2-RECURSE-VALID-001
    - Parent SSAP record has PCN=Fargo (Post_Comm), PC=58102 (Post_Code)
  input_file: requests/G2-RECURSE-VALID-002.xml
  expected:
    response_type: locationValidation
    valid: [ca:country, ca:A1, ca:A2, ca:A3, ca:RD, ca:STS, ca:POD, ca:HNO, ca:PCN, ca:PC]
  notes: >
    LIVE TEST — requires a running parent LVF. Companion to G2-RECURSE-VALID-001.
  spec_ref: "RFC 5222 §5, §6 (Gate 2)"
  status: has_test

- id: G2-RECURSE-INVALID-A3-001
  description: >
    A2=Morton County, A3=Bismarck with recursive="true". Morton County is outside
    this LVF's coverage. The child forwards to the parent which holds Morton County
    GIS data. The parent finds Morton County records (A2 succeeds) but no records for
    A3=Bismarck (Bismarck is in Burleigh County, not Morton County). The parent returns
    locationValidation with invalid at ca:A3. The child prepends its <via> and returns
    the parent's response.
  preconditions:
    - LVF_PARENT_URI configured and parent LVF running with Morton County GIS data
    - Parent GIS contains Morton County (A2 match succeeds) but not A3=Bismarck under it
  input_file: requests/G2-RECURSE-INVALID-A3-001.xml
  expected:
    response_type: locationValidation
    valid: [ca:country, ca:A1, ca:A2]
    invalid: [ca:A3]
    unchecked: [ca:RD, ca:STS, ca:HNO]
  notes: >
    LIVE TEST — requires a running parent LVF provisioned with Morton County GIS data.
    Companion to G2-FALL-INVALID-A3-001 which tests the same A3 failure locally
    (Bismarck is present in local GIS under Burleigh County, not Morton County).
  spec_ref: "RFC 5222 §5, §6.1"
  status: has_test

- id: G2-RECURSE-FG-OOC-COUNTRY-001
  description: >
    country=CA (Canada) with recursive="true". CA is outside this LVF's coverage.
    The child forwards to the parent. The parent also has no CA coverage and forwards
    to the Forest Guide. The Forest Guide holds no registered coverage for CA and
    returns <notFound>. Full chain traversed: child → parent → Forest Guide.
  preconditions:
    - LVF_PARENT_URI configured and parent LVF running
    - Parent LVF configured with a Forest Guide (fg.lvf.ndaco.org)
    - Forest Guide running with no coverage region matching country=CA
  input_file: requests/G2-RECURSE-FG-OOC-COUNTRY-001.xml
  expected:
    response_type: notFound
  notes: >
    LIVE TEST — requires a running parent LVF and Forest Guide. The <notFound> is
    returned by the Forest Guide (source: fg.lvf.ndaco.org). Without both services
    this test produces serverTimeout or serverError.
    Companion to G2-REDIRECT-OOC-COUNTRY-001 which tests the same country=CA failure
    without recursive="true" and returns <redirect> locally.
  spec_ref: "RFC 5222 §5, RFC 5582 §8"
  status: has_test
