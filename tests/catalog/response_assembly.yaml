---
# Response assembly tests: mapping element selection and warning generation.
# These tests focus on the §8.5 mapping selection logic and the defaultMappingReturned
# warning path when no boundary can be identified for the submitted address.

- id: RESP-MAPPING-DEFAULT-001
  description: >
    Address submitted with country=CA (Canada), outside the coverage of any
    provisioned boundary. Gate 2 fails at ca:country (no GIS records match CA).
    Because no boundary can be identified from the submitted administrative fields,
    the default mapping is returned with sourceId={00000000-0000-0000-0000-000000000000}
    and a <defaultMappingReturned> warning. The mapping displayName is
    "VALIDATION RESULT ONLY" and has no <uri> or <serviceNumber>.
  preconditions:
    - No GIS records with country=CA
    - Default mapping sourceId configured in LVF_DEFAULT_MAPPING_SOURCE_ID
  input_file: requests/RESP-MAPPING-DEFAULT-001.xml
  expected:
    response_type: locationValidation
    invalid: [ca:country]
    unchecked: [ca:A1, ca:A2, ca:A3, ca:RD, ca:STS, ca:HNO]
  notes: >
    The <defaultMappingReturned> warning is required by RFC 5222 to signal that the
    mapping present in the response is a placeholder, not an authoritative routing
    result. Distinct from G2-SSAP-INVALID-COUNTRY-001 only in that this test submits
    a non-US address entirely outside coverage, while that test also submits CA but
    from a different address.
  spec_ref: "§8.5, RFC 5222 §12"
  status: has_test

- id: RESP-MAPPING-PARTIAL-001
  description: >
    Address is within the LVF coverage area (country/A1/A2 match) but the specific
    street or HNO cannot be validated. A real provisioned mapping is returned (not the
    default placeholder) even though the locationValidation result is non-conforming.
    Confirms that the boundary/mapping lookup uses the successfully validated
    administrative elements, not the full address.
  preconditions: >
    - An address within a provisioned coverage area where street-level validation
      fails (e.g. A3 is valid but RD is not found in GIS)
    - The coverage lookup must be able to resolve a real boundary from the valid
      country/A1/A2 elements
    - The resolved mapping must NOT be the default placeholder
  input_file: requests/RESP-MAPPING-PARTIAL-001.xml
  expected:
    response_type: locationValidation
  notes: >
    Distinguishes the case where coverage lookup succeeds on partial valid data
    from RESP-MAPPING-DEFAULT-001 where coverage lookup fails entirely. The spec
    requires a real mapping whenever the coverage area can be determined. No test
    data currently exists for this scenario as a dedicated test; most existing
    invalid-result tests implicitly cover this (e.g. G2-SSAP-INVALID-A3-001
    returns the real CDCC mapping despite A3 being invalid).
  spec_ref: "§8.5"
  status: no_test_data
